<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Ormoc Printshoppe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
    }

    /* ── NAV ── */
    .topnav {
      background: #1a3c5e;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .topnav .brand { font-size: 15px; font-weight: 700; }
    .topnav .brand span { color: #f6ad55; }
    .nav-links { display: flex; gap: 6px; }
    .nav-links a {
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      transition: all 0.2s;
    }
    .nav-links a:hover, .nav-links a.active {
      background: rgba(255,255,255,0.15);
      color: white;
    }

    .page { max-width: 960px; margin: 0 auto; padding: 24px 16px 80px; }

    /* ── HEADER ── */
    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .dash-header h1 { font-size: 22px; font-weight: 700; color: #1a3c5e; }
    .dash-header p  { font-size: 13px; color: #718096; margin-top: 3px; }

    .month-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      background: white;
      border-radius: 8px;
      padding: 8px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .month-selector label { font-size: 12px; font-weight: 600; color: #4a5568; }
    .month-selector select {
      border: none;
      font-size: 13px;
      font-weight: 600;
      color: #1a3c5e;
      background: transparent;
      cursor: pointer;
      outline: none;
    }
    .btn-refresh {
      background: #1a3c5e;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-refresh:hover { background: #153050; }

    /* ── SECTION TITLE ── */
    .section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #718096;
      margin: 24px 0 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e2e8f0;
    }

    /* ── KPI GRID ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    @media (max-width: 700px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 380px) { .kpi-grid { grid-template-columns: 1fr; } }

    .kpi-card {
      background: white;
      border-radius: 12px;
      padding: 18px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-top: 3px solid #e2e8f0;
      transition: transform 0.2s;
    }
    .kpi-card:hover { transform: translateY(-2px); }
    .kpi-card.blue   { border-top-color: #3182ce; }
    .kpi-card.purple { border-top-color: #805ad5; }
    .kpi-card.green  { border-top-color: #38a169; }
    .kpi-card.orange { border-top-color: #dd6b20; }
    .kpi-card.red    { border-top-color: #e53e3e; }
    .kpi-card.teal   { border-top-color: #319795; }
    .kpi-card.gold   { border-top-color: #d69e2e; }
    .kpi-card.navy   { border-top-color: #1a3c5e; }

    .kpi-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #a0aec0;
      margin-bottom: 8px;
    }
    .kpi-value {
      font-size: 28px;
      font-weight: 800;
      color: #1a202c;
      line-height: 1;
      margin-bottom: 4px;
    }
    .kpi-sub {
      font-size: 11px;
      color: #718096;
    }
    .kpi-trend {
      font-size: 11px;
      font-weight: 600;
      margin-top: 6px;
    }
    .trend-up   { color: #38a169; }
    .trend-down { color: #e53e3e; }
    .trend-neu  { color: #a0aec0; }

    /* ── WEEKLY GRADE ── */
    .grade-banner {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .grade-circle {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
      flex-shrink: 0;
      color: white;
    }
    .grade-green  { background: #38a169; }
    .grade-yellow { background: #d69e2e; }
    .grade-red    { background: #e53e3e; }

    .grade-info { flex: 1; min-width: 160px; }
    .grade-info h3 { font-size: 16px; font-weight: 700; color: #1a202c; }
    .grade-info p  { font-size: 13px; color: #718096; margin-top: 3px; }

    .grade-targets {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }
    .grade-target { text-align: center; }
    .grade-target .t-val {
      font-size: 18px;
      font-weight: 800;
      color: #1a3c5e;
    }
    .grade-target .t-lbl {
      font-size: 11px;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    /* ── PIPELINE FUNNEL ── */
    .pipeline-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .pipeline-card h3 {
      font-size: 14px;
      font-weight: 700;
      color: #1a3c5e;
      margin-bottom: 16px;
    }

    .stage-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .stage-name {
      font-size: 12px;
      font-weight: 600;
      color: #4a5568;
      width: 90px;
      flex-shrink: 0;
    }
    .stage-bar-wrap {
      flex: 1;
      background: #f0f4f8;
      border-radius: 4px;
      height: 24px;
      overflow: hidden;
    }
    .stage-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s ease;
      display: flex;
      align-items: center;
      padding-left: 8px;
      min-width: 2px;
    }
    .stage-bar span {
      font-size: 11px;
      font-weight: 700;
      color: white;
      white-space: nowrap;
    }
    .stage-value {
      font-size: 12px;
      font-weight: 700;
      color: #4a5568;
      width: 90px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Stage colors */
    .bar-lead       { background: #a0aec0; }
    .bar-prospect   { background: #63b3ed; }
    .bar-qualified  { background: #68d391; }
    .bar-quoted     { background: #f6ad55; }
    .bar-follow-up  { background: #fc8181; }
    .bar-hot        { background: #e53e3e; }
    .bar-closed-won { background: #38a169; }
    .bar-closed-lost{ background: #718096; }

    /* ── CONVERSION RATIOS ── */
    .ratio-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    @media (max-width: 600px) { .ratio-grid { grid-template-columns: 1fr; } }

    .ratio-card {
      background: white;
      border-radius: 12px;
      padding: 18px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      text-align: center;
    }
    .ratio-pct {
      font-size: 32px;
      font-weight: 800;
      color: #1a3c5e;
      line-height: 1;
      margin-bottom: 6px;
    }
    .ratio-label {
      font-size: 12px;
      font-weight: 600;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .ratio-sub { font-size: 11px; color: #a0aec0; margin-top: 4px; }

    /* ── AGING ALERTS ── */
    .alerts-card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .alerts-card h3 {
      font-size: 14px;
      font-weight: 700;
      color: #1a3c5e;
      margin-bottom: 14px;
    }
    .alert-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      border-radius: 8px;
      margin-bottom: 8px;
      background: #f7fafc;
      border-left: 3px solid #e2e8f0;
    }
    .alert-row.warn  { background: #fffaf0; border-left-color: #dd6b20; }
    .alert-row.danger{ background: #fff5f5; border-left-color: #e53e3e; }
    .alert-row.ok    { background: #f0fff4; border-left-color: #38a169; }

    .alert-text { font-size: 13px; color: #2d3748; font-weight: 500; }
    .alert-count {
      font-size: 18px;
      font-weight: 800;
      min-width: 36px;
      text-align: right;
    }
    .alert-count.warn   { color: #dd6b20; }
    .alert-count.danger { color: #e53e3e; }
    .alert-count.ok     { color: #38a169; }

    /* ── TWO COL LAYOUT ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 640px) { .two-col { grid-template-columns: 1fr; } }

    /* ── LOADING SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, #f0f4f8 25%, #e2e8f0 50%, #f0f4f8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── OVERLAY ── */
    #overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(255,255,255,0.85);
      z-index: 500;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #overlay.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e2e8f0;
      border-top-color: #1a3c5e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #overlay p { font-size: 14px; color: #4a5568; font-weight: 500; }

    /* ── KPI SCORE BAR ── */
    .score-wrap {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .score-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .score-top h3 { font-size: 14px; font-weight: 700; color: #1a3c5e; }
    .score-badge {
      font-size: 20px;
      font-weight: 900;
      padding: 4px 16px;
      border-radius: 20px;
    }
    .score-badge.green  { background: #f0fff4; color: #276749; }
    .score-badge.yellow { background: #fffaf0; color: #c05621; }
    .score-badge.red    { background: #fff5f5; color: #c53030; }

    .score-bar-wrap {
      background: #f0f4f8;
      border-radius: 8px;
      height: 14px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .score-bar {
      height: 100%;
      border-radius: 8px;
      transition: width 1s ease;
    }
    .score-bar.green  { background: linear-gradient(90deg, #38a169, #68d391); }
    .score-bar.yellow { background: linear-gradient(90deg, #d69e2e, #f6e05e); }
    .score-bar.red    { background: linear-gradient(90deg, #e53e3e, #fc8181); }

    .score-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #a0aec0;
    }

    .last-updated {
      font-size: 11px;
      color: #a0aec0;
      text-align: right;
      margin-top: 16px;
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <div class="brand">Ormoc <span>Printshoppe</span> CRM</div>
  <div class="nav-links">
    <a data-page="lead" href="#">📋 New Lead</a>
    <a data-page="search" href="#">🔍 Search</a>
    <a data-page="dashboard" href="#" class="active">📊 Dashboard</a>
  </div>
</nav>

<!-- OVERLAY -->
<div id="overlay">
  <div class="spinner"></div>
  <p>Loading dashboard...</p>
</div>

<!-- PAGE -->
<div class="page">

  <!-- HEADER -->
  <div class="dash-header">
    <div>
      <h1>📊 Dashboard</h1>
      <p id="dashSubtitle">Loading data...</p>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <div class="month-selector">
        <label>Month:</label>
        <select id="monthPicker" onchange="loadDashboard()"></select>
      </div>
      <button class="btn-refresh" onclick="loadDashboard()">↻ Refresh</button>
    </div>
  </div>

  <!-- WEEKLY GRADE -->
  <div class="section-title">📅 This Week's Performance</div>
  <div class="grade-banner" id="gradeBanner">
    <div class="skeleton" style="width:64px;height:64px;border-radius:50%;"></div>
    <div class="skeleton" style="flex:1;height:40px;"></div>
  </div>

  <!-- KPI CARDS -->
  <div class="section-title">📋 Monthly KPIs</div>
  <div class="kpi-grid" id="kpiGrid">
    <!-- Filled by JS -->
    <div class="kpi-card"><div class="skeleton" style="height:70px;"></div></div>
    <div class="kpi-card"><div class="skeleton" style="height:70px;"></div></div>
    <div class="kpi-card"><div class="skeleton" style="height:70px;"></div></div>
    <div class="kpi-card"><div class="skeleton" style="height:70px;"></div></div>
    <div class="kpi-card"><div class="skeleton" style="height:70px;"></div></div>
    <div class="kpi-card"><div class="skeleton" style="height:70px;"></div></div>
    <div class="kpi-card"><div class="skeleton" style="height:70px;"></div></div>
    <div class="kpi-card"><div class="skeleton" style="height:70px;"></div></div>
  </div>

  <!-- KPI SCORE -->
  <div class="section-title">🏆 Monthly KPI Score</div>
  <div class="score-wrap" id="scoreWrap">
    <div class="skeleton" style="height:60px;"></div>
  </div>

  <!-- PIPELINE + ALERTS -->
  <div class="section-title">🚀 Pipeline & Alerts</div>
  <div class="two-col">
    <div class="pipeline-card" id="pipelineCard">
      <h3>Pipeline by Stage</h3>
      <div class="skeleton" style="height:200px;"></div>
    </div>
    <div class="alerts-card" id="alertsCard">
      <h3>⚠️ Aging Alerts</h3>
      <div class="skeleton" style="height:200px;"></div>
    </div>
  </div>

  <!-- CONVERSION RATIOS -->
  <div class="section-title">📈 Conversion Ratios</div>
  <div class="ratio-grid" id="ratioGrid">
    <div class="ratio-card"><div class="skeleton" style="height:80px;"></div></div>
    <div class="ratio-card"><div class="skeleton" style="height:80px;"></div></div>
    <div class="ratio-card"><div class="skeleton" style="height:80px;"></div></div>
  </div>

  <div class="last-updated" id="lastUpdated"></div>
</div>

<script>
  // ── INIT ─────────────────────────────────────────────────────────
  window.onload = function() {
    populateMonthPicker();
    loadDashboard();
  };

  function populateMonthPicker() {
    const sel = document.getElementById('monthPicker');
    const now = new Date();
    for (let i = 0; i < 6; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      const val = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      const lbl = d.toLocaleString('default', { month: 'long', year: 'numeric' });
      const opt = document.createElement('option');
      opt.value = val; opt.textContent = lbl;
      sel.appendChild(opt);
    }
  }

  function loadDashboard() {
    const month = document.getElementById('monthPicker').value;
    document.getElementById('overlay').classList.add('show');

    google.script.run
      .withSuccessHandler(renderDashboard)
      .withFailureHandler(err => {
        document.getElementById('overlay').classList.remove('show');
        document.getElementById('dashSubtitle').textContent = 'Error loading data: ' + err.message;
      })
      .getDashboardData(month);
  }

  // ── RENDER ────────────────────────────────────────────────────────
  function renderDashboard(d) {
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('dashSubtitle').textContent =
      'Data for ' + d.monthLabel + ' · ' + d.totalLeads + ' total leads';
    document.getElementById('lastUpdated').textContent =
      'Last updated: ' + new Date().toLocaleTimeString();

    renderGrade(d);
    renderKPIs(d);
    renderScore(d);
    renderPipeline(d);
    renderAlerts(d);
    renderRatios(d);
  }

  // ── WEEKLY GRADE ──────────────────────────────────────────────────
  function renderGrade(d) {
    const visits = d.weekVisits || 0;
    let gradeClass = 'grade-red', gradeLabel = '🔴 RED', msg = 'Critical — below 25 visits';
    if (visits >= 40)      { gradeClass = 'grade-green';  gradeLabel = '🟢 GREEN'; msg = 'On Track — 40+ visits this week'; }
    else if (visits >= 25) { gradeClass = 'grade-yellow'; gradeLabel = '🟡 YELLOW'; msg = 'Needs Coaching — 25–39 visits'; }

    document.getElementById('gradeBanner').innerHTML = `
      <div class="grade-circle ${gradeClass}">${visits}</div>
      <div class="grade-info">
        <h3>${gradeLabel} — Week ${d.currentWeek || ''}</h3>
        <p>${msg}</p>
      </div>
      <div class="grade-targets">
        <div class="grade-target">
          <div class="t-val">${d.weekValidVisits || 0}</div>
          <div class="t-lbl">Valid Visits</div>
        </div>
        <div class="grade-target">
          <div class="t-val">${d.weekDMs || 0}</div>
          <div class="t-lbl">DMs Spoken</div>
        </div>
        <div class="grade-target">
          <div class="t-val">${d.weekQuotations || 0}</div>
          <div class="t-lbl">Quotations</div>
        </div>
        <div class="grade-target">
          <div class="t-val">${d.weekHotLeads || 0}</div>
          <div class="t-lbl">Hot Leads</div>
        </div>
      </div>
    `;
  }

  // ── KPI CARDS ─────────────────────────────────────────────────────
  function renderKPIs(d) {
    const kpis = [
      { label: 'Total Leads',     value: d.totalLeads,      sub: 'Target: 150/mo',      color: 'blue',   pct: pct(d.totalLeads, 150) },
      { label: 'Valid Visits',    value: d.validVisits,     sub: 'All required fields',  color: 'navy',   pct: pct(d.validVisits, 150) },
      { label: 'Decision Makers', value: d.decisionMakers,  sub: 'Target: 60/mo',        color: 'purple', pct: pct(d.decisionMakers, 60) },
      { label: 'Quotations Sent', value: d.quotationsSent,  sub: 'Target: 20/mo',        color: 'orange', pct: pct(d.quotationsSent, 20) },
      { label: 'Follow-ups Done', value: d.followupsDone,   sub: 'Target: 80/mo',        color: 'teal',   pct: pct(d.followupsDone, 80) },
      { label: 'Hot Leads',       value: d.hotLeads,        sub: 'Target: 20/mo',        color: 'red',    pct: pct(d.hotLeads, 20) },
      { label: 'Closed Won',      value: d.closedWon,       sub: 'New clients closed',   color: 'green',  pct: pct(d.closedWon, 2) },
      { label: 'Pipeline Value',  value: '₱' + fmt(d.pipelineValue), sub: 'All active stages', color: 'gold', pct: null },
    ];

    document.getElementById('kpiGrid').innerHTML = kpis.map(k => `
      <div class="kpi-card ${k.color}">
        <div class="kpi-label">${k.label}</div>
        <div class="kpi-value">${k.value}</div>
        ${k.pct !== null
          ? `<div class="kpi-trend ${k.pct >= 100 ? 'trend-up' : k.pct >= 70 ? 'trend-neu' : 'trend-down'}">
              ${k.pct >= 100 ? '▲' : k.pct >= 70 ? '→' : '▼'} ${k.pct}% of target
             </div>`
          : `<div class="kpi-sub">${k.sub}</div>`
        }
      </div>
    `).join('');
  }

  // ── KPI SCORE ─────────────────────────────────────────────────────
  function renderScore(d) {
    const score     = d.kpiScore || 0;
    const scoreClass = score >= 90 ? 'green' : score >= 80 ? 'yellow' : 'red';
    const incentive  = score >= 90 ? '₱50/day Incentive ✅'
                     : score >= 80 ? '₱25/day Incentive (50%)'
                     : 'No Incentive ❌';

    document.getElementById('scoreWrap').innerHTML = `
      <div class="score-top">
        <h3>Monthly KPI Score (Sales 70% + Compliance 30%)</h3>
        <div class="score-badge ${scoreClass}">${score.toFixed(1)}/100</div>
      </div>
      <div class="score-bar-wrap">
        <div class="score-bar ${scoreClass}" style="width:${score}%"></div>
      </div>
      <div class="score-labels">
        <span>0</span>
        <span>🔴 Below 80: No Incentive</span>
        <span>🟡 80–89: 50%</span>
        <span>🟢 90–100: Full</span>
      </div>
      <div style="margin-top:10px;font-size:13px;font-weight:600;color:#4a5568;">
        Discipline Incentive: <span style="color:${scoreClass === 'green' ? '#38a169' : scoreClass === 'yellow' ? '#d69e2e' : '#e53e3e'}">${incentive}</span>
        &nbsp;·&nbsp; Commission: <span style="color:#1a3c5e">${d.commissionEligible ? '✅ Eligible (₱25k threshold met)' : '❌ Below ₱25k threshold'}</span>
      </div>
    `;
  }

  // ── PIPELINE ──────────────────────────────────────────────────────
  function renderPipeline(d) {
    const stages = d.pipeline || [];
    const maxCount = Math.max(...stages.map(s => s.count), 1);
    const stageColors = {
      'Lead': 'bar-lead', 'Prospect': 'bar-prospect', 'Qualified': 'bar-qualified',
      'Quoted': 'bar-quoted', 'Follow-up': 'bar-follow-up', 'Hot': 'bar-hot',
      'Closed Won': 'bar-closed-won', 'Closed Lost': 'bar-closed-lost'
    };

    document.getElementById('pipelineCard').innerHTML = `
      <h3>Pipeline by Stage</h3>
      ${stages.map(s => `
        <div class="stage-row">
          <div class="stage-name">${s.stage}</div>
          <div class="stage-bar-wrap">
            <div class="stage-bar ${stageColors[s.stage] || 'bar-lead'}"
                 style="width:${Math.max((s.count / maxCount) * 100, 2)}%">
              <span>${s.count > 0 ? s.count : ''}</span>
            </div>
          </div>
          <div class="stage-value">₱${fmt(s.value)}</div>
        </div>
      `).join('')}
    `;
  }

  // ── ALERTS ────────────────────────────────────────────────────────
  function renderAlerts(d) {
    const alerts = [
      { text: 'Leads stuck same stage >14 days', count: d.stuckLeads || 0,       warn: 1,  danger: 3 },
      { text: 'Quotations pending >7 days',       count: d.pendingQuotations || 0, warn: 1, danger: 3 },
      { text: 'Hot leads not contacted >3 days',  count: d.coldHotLeads || 0,     warn: 1,  danger: 2 },
      { text: 'Missing visit photo links',         count: d.missingPhotos || 0,    warn: 1,  danger: 3 },
      { text: 'Follow-ups due today',              count: d.dueTodayCount || 0,    warn: 3,  danger: 6 },
    ];

    document.getElementById('alertsCard').innerHTML = `
      <h3>⚠️ Aging Alerts</h3>
      ${alerts.map(a => {
        const cls = a.count === 0 ? 'ok' : a.count >= a.danger ? 'danger' : 'warn';
        return `
          <div class="alert-row ${cls}">
            <div class="alert-text">${a.text}</div>
            <div class="alert-count ${cls}">${a.count}</div>
          </div>`;
      }).join('')}
    `;
  }

  // ── CONVERSION RATIOS ─────────────────────────────────────────────
  function renderRatios(d) {
    const visitToQuot = d.validVisits > 0
      ? Math.round((d.quotationsSent / d.validVisits) * 100) : 0;
    const quotToClose = d.quotationsSent > 0
      ? Math.round((d.closedWon / d.quotationsSent) * 100) : 0;
    const avgDeal = d.closedWon > 0
      ? Math.round(d.closedRevenue / d.closedWon) : 0;

    document.getElementById('ratioGrid').innerHTML = `
      <div class="ratio-card">
        <div class="ratio-pct">${visitToQuot}%</div>
        <div class="ratio-label">Visit → Quotation</div>
        <div class="ratio-sub">${d.quotationsSent} of ${d.validVisits} visits</div>
      </div>
      <div class="ratio-card">
        <div class="ratio-pct">${quotToClose}%</div>
        <div class="ratio-label">Quotation → Close</div>
        <div class="ratio-sub">${d.closedWon} of ${d.quotationsSent} quotes</div>
      </div>
      <div class="ratio-card">
        <div class="ratio-pct">₱${fmt(avgDeal)}</div>
        <div class="ratio-label">Avg Deal Size</div>
        <div class="ratio-sub">From ${d.closedWon} closed deals</div>
      </div>
    `;
  }

  // ── HELPERS ───────────────────────────────────────────────────────
  function pct(actual, target) {
    return Math.min(Math.round((actual / target) * 100), 999);
  }
  function fmt(n) {
    if (!n) return '0';
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000)    return (n / 1000).toFixed(1) + 'K';
    return Number(n).toLocaleString();
  }
</script>

<script>
  // Navigation helper — builds correct Apps Script web app URLs
  (function() {
    google.script.run
      .withSuccessHandler(function(baseUrl) {
        var links = document.querySelectorAll('[data-page]');
        links.forEach(function(el) {
          el.href = baseUrl + '?page=' + el.getAttribute('data-page');
        });
      })
      .getWebAppUrl();
  })();
</script>
</body>
